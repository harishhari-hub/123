<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHARAN VAULT 😎</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: radial-gradient(ellipse at top, #0a192f 0%, #020617 100%);
            min-height: 100vh;
        }

        /* NEW TOGETHER BACKGROUND */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("together.img.jpeg") center / cover no-repeat;
            filter: brightness(0.35) saturate(1.2);
            z-index: -1;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 22px;
            color: #00eaff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0,255,255,0.4);
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .back-btn {
            background: transparent;
            border: 1px solid rgba(0,255,255,0.4);
            color: #00eaff;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(0, 234, 255, 0.12);
            border-color: #00eaff;
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        .count-badge {
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            color: #00eaff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
        }

        /* VAULT CONTAINER */
        .vault-content {
            max-width: 1200px;
            margin: 20px auto 120px;
            padding: 0 24px;
        }

        /* SESSIONS STYLING */
        .section-title {
            font-size: 20px;
            color: #00eaff;
            margin: 40px 0 20px 0;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,255,255,0.15);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            stroke: rgba(0,255,255,0.3);
            fill: none;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-state span {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
        }

        /* GALLERY CARD */
        .gallery-item {
            background: rgba(7, 16, 33, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            backdrop-filter: blur(8px);
        }

        .gallery-item:hover {
            border-color: rgba(0,255,255,0.3);
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
            transform: translateY(-2px);
        }

        .media-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            background: #000;
            cursor: pointer;
        }

        .media-wrapper img,
        .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-actions {
            padding: 12px;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* SEPARATE DELETE BUTTON AT BOTTOM */
        .card-btn-delete {
            background: rgba(220, 38, 38, 0.15);
            color: #ef4444;
            border: 1px solid rgba(220, 38, 38, 0.5);
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.2s;
            width: 100%;
        }

        .card-btn-delete:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }

        /* FLOATING ADD BUTTON */
        .floating-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00eaff, #007bff);
            color: #000;
            font-size: 28px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }

        .floating-add:hover {
            transform: scale(1.12);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        /* MODAL OVERLAY */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a192f, #0d1f3c);
            padding: 36px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0 40px rgba(0,255,255,0.1);
        }

        .modal-content h2 {
            color: #00eaff;
            font-size: 22px;
            margin-bottom: 24px;
        }

        .upload-area {
            border: 2px dashed rgba(0,255,255,0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            transition: 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: rgba(0,255,255,0.7);
            background: rgba(0,255,255,0.03);
        }

        .upload-area input[type="file"] {
            width: 100%;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            cursor: pointer;
        }

        .upload-area p {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-top: 10px;
        }

        #preview-img {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-save {
            background: linear-gradient(135deg, #00eaff, #007bff);
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .btn-save:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.15);
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox.active { display: flex; }

        #lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,255,255,0.2);
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            color: white;
            font-size: 32px;
            cursor: pointer;
            z-index: 20001;
            opacity: 0.7;
            transition: 0.2s;
        }

        .lightbox-close:hover { opacity: 1; }

        /* LOADING */
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(2,6,23,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            gap: 16px;
            color: #00eaff;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,255,0.2);
            border-top-color: #00eaff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== MOBILE RESPONSIVENESS ========== */
        @media (max-width: 768px) {
            .gallery-grid, .vault-content {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
                padding: 20px 15px;
            }
            .header {
                padding: 30px 15px;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .header p {
                font-size: 0.85rem;
                padding: 0 10px;
            }
            .floating-add {
                bottom: 80px; 
                right: 20px; 
                left: auto; /* move it to right so it doesn't block text overflow too heavily */
                width: 50px;
                height: 50px;
                font-size: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                line-height: 0;
            }
            #modal .modal-content {
                width: 90%;
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Vault...</p>
    </div>

    <!-- HEADER -->
    <div class="header">
        <h1>SHARAN VAULT 😎</h1>
        <div class="header-right">
            <span class="count-badge" id="itemCount">0 items</span>
            <a href="index.html" class="back-btn">← Back to Portfolio</a>
        </div>
    </div>

    <!-- MAIN VAULT CONTENT REGION -->
    <div class="vault-content" id="vaultContent"></div>

    <!-- FLOATING ADD BUTTON -->
    <button class="floating-add" id="vaultAddBtn" title="Add to Vault" style="z-index:9999;">+</button>

    <!-- ADD MODAL -->
    <div id="modal" style="display:none;">
        <div class="modal-content">
            <h2>Add to Vault</h2>
            <div class="upload-area">
                <input type="file" id="fileInput" accept="image/*,video/*" onchange="previewFile()">
                <p>Supports images and videos</p>
                <img id="preview-img" alt="Preview">
            </div>
            <div class="modal-btns">
                <button class="btn-save" onclick="addMedia()">Save to Vault</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="Full view">
    </div>

    <!-- FIREBASE COMPAT SDK (works on file:// and https://) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js">
        // UI MODAL CONTROLS
        function openModal() {
            const m = document.getElementById("modal");
            if(m) { m.style.display = "flex"; m.style.alignItems = "center"; m.style.justifyContent = "center"; }
        }
        function closeModal() {
            const m = document.getElementById("modal");
            if(m) m.style.display = "none";
        }

    </script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js?v=1775827307413"></script>
    <script>
        // ==========================================
        // SHARAN VAULT — Pure Firebase Storage Collection System
        // ==========================================

        let galleryData = [];

        // RENDER GALLERY
        async function renderGallery() {
            const vaultContainer = document.getElementById("vaultContent");
            vaultContainer.innerHTML = "";

            // Wait for DOM to be ready if called early
            if (!vaultContainer) return;

            // Update count badge
            document.getElementById("itemCount").textContent =
                galleryData.length + (galleryData.length === 1 ? " item" : " items");

            if (galleryData.length === 0) {
                vaultContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2.5"/>
                            <circle cx="8.5" cy="8.5" r="1.5" fill="rgba(0,255,255,0.3)" stroke="none"/>
                            <polyline points="21,15 16,10 11,15.5 8,12 3,18"/>
                        </svg>
                        <p>Your vault is empty</p>
                        <span>Click the + button to add images or videos</span>
                    </div>`;
                return;
            }

            let imagesHTML = '<h2 class="section-title">Images Session</h2><div class="gallery-grid">';
            let videosHTML = '<h2 class="section-title">Videos Session</h2><div class="gallery-grid">';
            
            let hasImages = false;
            let hasVideos = false;

            galleryData.forEach((item, index) => {
                // Safeguard against old local paths
                if (item.src && (item.src.startsWith('file://') || item.src.startsWith('C:/'))) {
                    return; 
                }

                const dateStr = item.date || "Unknown Date";
                const isVideo = item.type === "video";
                
                const cardHTML = `
                    <div class="gallery-item" onclick="openLightbox(${index})">
                        ${isVideo 
                            ? `<div class="video-indicator">▶</div>
                               <video src="${item.src}" preload="metadata"></video>`
                            : `<img src="${item.src}" loading="lazy" alt="Vault Item">`
                        }
                        <div class="delete-btn" onclick="deleteMedia(${index}, "${item.id}", event)">
                            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </div>
                        <div class="item-overlay">
                            <span class="item-date">${dateStr}</span>
                        </div>
                    </div>
                `;

                if (isVideo) {
                    hasVideos = true;
                    videosHTML += cardHTML;
                } else {
                    hasImages = true;
                    imagesHTML += cardHTML;
                }
            });

            imagesHTML += '</div>';
            videosHTML += '</div>';

            if (hasImages) vaultContainer.innerHTML += imagesHTML;
            if (hasVideos) vaultContainer.innerHTML += videosHTML;
        }

        // LOAD DATA USING GETDOCS (PROPER ASYNC WITH TRY/FINALLY)
        async function loadGalleryData() {
            const loading = document.getElementById("loading");
            if (loading) loading.style.display = "flex";

            try {
                if (!window.db) {
                    console.warn("Firebase not initialized yet. Using empty state.");
                    galleryData = [];
                    return;
                }

                // Explicit getDocs on the generic collection
                const querySnapshot = await window.db.collection("gallery").get();
                
                galleryData = [];
                querySnapshot.forEach((doc) => {
                    galleryData.push({ id: doc.id, ...doc.data() });
                });

                // Sort newest first
                galleryData.sort((a, b) => b.timestamp - a.timestamp);

            } catch (err) {
                console.warn("Firestore fetch failed:", err);
                galleryData = []; 
            } finally {
                renderGallery();
                // Ensure loader ALWAYS disappears no matter what
                if (loading) loading.style.display = "none";
            }
        }

        // ON-LOAD INITIALIZATION
        window.onload = () => {
            setTimeout(() => {
                loadGalleryData();
            }, 500);
            
            // Hard fallback just in case Firebase hangs forever
            setTimeout(() => {
                const loading = document.getElementById("loading");
                if (loading && loading.style.display !== "none") {
                    loading.style.display = "none";
                    if (galleryData.length === 0) renderGallery();
                }
            }, 4000);
        };

        // FIREBASE STORAGE UPLOAD (Collection Flow)
        async function addMedia() {
            const fileInput = document.getElementById("fileInput");
            if (!fileInput) return alert("Upload element error");
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select a file to upload!");
                return;
            }

            if (!window.db || !window.storage) {
                alert("Cloud Storage is not connected!");
                return;
            }

            const loading = document.getElementById("loading");
            const saveBtn = document.querySelector(".btn-save");
            
            if (loading) {
                loading.style.display = "flex";
                loading.innerHTML = '<div class="spinner"></div><p>Uploading to secure cloud...</p>';
            }
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = "Uploading...";
            }

            try {
                const isVideo = file.type.startsWith('video/');
                // BYPASS FIREBASE STORAGE - USE DATABASE DATA URIS FOR INSTANT UPLOAD
                let publicUrl = "";
                if (isVideo) {
                    alert("Videos require Firebase Storage. Without the bucket enabled, only images can be saved directly.");
                    throw new Error("BUCKET_MISSING_FOR_VIDEO");
                } else {
                    // Compress image aggressively and safely store as a direct database string
                    publicUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                let w = img.width, h = img.height;
                                const max = 800; // Ensure sub-1MB size for Firestore
                                if (w > max || h > max) {
                                    if (w > h) { h *= max / w; w = max; }
                                    else { w *= max / h; h = max; }
                                }
                                canvas.width = w; canvas.height = h;
                                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                resolve(canvas.toDataURL('image/jpeg', 0.7));
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    });
                }

                const newItem = {
                    type: isVideo ? "video" : "image",
                    src: publicUrl,
                    date: new Date().toLocaleDateString('en-GB'),
                    timestamp: Date.now()
                };

                // Push explicitly to "gallery" collection
                await window.db.collection("gallery").add(newItem);
                
                closeModal();
                alert("✅ Added tightly to Cloud Vault!");
                await loadGalleryData(); // Refresh cleanly

            } catch (error) {
                console.error("Upload failed", error);
                if (error.message === "BUCKET_MISSING") {
                    alert("⚠️ FIREBASE STORAGE IS EMPTY! ⚠️\n\nYou MUST go back to your Firebase Console, click 'Storage' on the left menu, and click 'Get Started' to activate the bucket! Your uploads are hanging because the bucket literally does not exist yet.");
                } else {
                    alert("Upload failed: " + error.message);
                }
            } finally {
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = "Save to Vault";
                }
                if (loading) {
                    loading.innerHTML = '<div class="spinner"></div><p>Loading Vault...</p>';
                    loading.style.display = "none";
                }
            }
        }

        // DELETE MEDIA
        async function deleteMedia(index, docId, event) {
            event.stopPropagation(); 
            
            if (confirm("Permanently delete this from the secure cloud?")) {
                try {
                    const item = galleryData[index];
                    
                    if (item.src.includes('firebasestorage')) {
                        try {
                            const fileRef = window.storage.ref(item.src);
                            await fileRef.delete();
                        } catch(e) { console.warn("Storage object ignored", e); }
                    }

                    // Strict doc deletion
                    if (docId) {
                        await window.db.collection("gallery").doc(docId).delete();
                        galleryData.splice(index, 1);
                        renderGallery();
                    }
                    
                } catch(e) {
                    alert("Delete failed: " + e.message);
                }
            }
        }

        // ==========================================
        // LIGHTBOX SYSTEM (UNCHANGED)
        // ==========================================
        let currentLightboxIndex = 0;

        function openLightbox(index) {
            currentLightboxIndex = index;
            const lightbox = document.getElementById("lightbox");
            const mediaContainer = document.getElementById("lightboxMedia");
            const img = document.getElementById("lightboxImg");
            const video = document.getElementById("lightboxVideo");
            
            const item = galleryData[index];
            
            if (item.type === "video") {
                img.style.display = "none";
                video.style.display = "block";
                video.src = item.src;
            } else {
                video.style.display = "none";
                img.style.display = "block";
                img.src = item.src;
            }
            
            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            const lightbox = document.getElementById("lightbox");
            const video = document.getElementById("lightboxVideo");
            video.pause();
            lightbox.classList.remove("active");
            document.body.style.overflow = "auto";
        }

        function slideLightbox(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex < 0) currentLightboxIndex = galleryData.length - 1;
            if (currentLightboxIndex >= galleryData.length) currentLightboxIndex = 0;
            openLightbox(currentLightboxIndex);
        }

        document.getElementById("lightbox").addEventListener("click", function(e) {
            if (e.target === this) closeLightbox();
        });

        document.addEventListener("keydown", function(e) {
            if (!document.getElementById("lightbox").classList.contains("active")) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowLeft") slideLightbox(-1);
            if (e.key === "ArrowRight") slideLightbox(1);
        });
    </script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var addBtn = document.getElementById("vaultAddBtn");
    var modal = document.getElementById("modal");
    var cancelBtn = document.querySelector(".btn-cancel");

    if (addBtn && modal) {
      addBtn.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        modal.style.cssText = "display:flex !important; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;";
        console.log("Vault modal opened");
      });
    }

    if (cancelBtn && modal) {
      cancelBtn.addEventListener("click", function() {
        modal.style.display = "none";
      });
    }

    // Also override the global functions just in case
    window.openModal = function() {
      if (modal) modal.style.cssText = "display:flex !important; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;";
    };
    window.closeModal = function() {
      if (modal) modal.style.display = "none";
    };
  });
</script>
</body>
</html>
